services:

  djinn:
    build:
      context: .
      dockerfile: Dockerfile.djinn
    container_name: coordin8-djinn
    ports:
      - "9001:9001"       # LeaseMgr
      - "9002:9002"       # Registry
      - "9003:9003"       # Proxy control
      - "9004:9004"       # TransactionMgr
      - "9005:9005"       # EventMgr
      - "9006:9006"       # Space
      - "9100-9200:9100-9200"  # Proxy forwarding port range
    environment:
      RUST_LOG: "coordin8_lease=debug,coordin8_registry=debug,coordin8_proxy=debug,coordin8_event=debug,coordin8_txn=debug,coordin8_space=debug,djinn=info"
      PROXY_BIND_HOST: "0.0.0.0"
      PROXY_PORT_MIN: "9100"
      PROXY_PORT_MAX: "9200"
      COORDIN8_PROVIDER: "${COORDIN8_PROVIDER:-local}"
      DYNAMODB_ENDPOINT: "http://localstack:4566"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-east-1"
    depends_on:
      localstack:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"  # lets Djinn call back to host (2PC participants)
    networks:
      - coordin8-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/9001'"]
      interval: 5s
      timeout: 3s
      retries: 10

  greeter:
    build:
      context: .
      dockerfile: Dockerfile.greeter
    container_name: coordin8-greeter
    depends_on:
      djinn:
        condition: service_healthy
    restart: on-failure
    environment:
      DJINN_HOST: djinn        # reach Djinn by service name on Docker network
      ADVERTISE_HOST: greeter  # Djinn proxy will forward to greeter:50051
      GRPC_PORT: "50051"
    networks:
      - coordin8-net

  # LocalStack — AWS emulation for integration testing
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - coordin8-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"dynamodb\": \"available\"'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Dashboard — Coordin8 observability UI (Phase 9)
  # dashboard:
  #   image: coordin8/dashboard:latest
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - DJINN_LEASE_ADDR=djinn:9001
  #     - DJINN_REGISTRY_ADDR=djinn:9002

networks:
  coordin8-net:
    driver: bridge

volumes:
  localstack-data:
