syntax = "proto3";

package coordin8;

import "coordin8/lease.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/coordin8/proto/coordin8";

// SpaceService — distributed reactive tuple store.
// Modeled after net.jini.space.JavaSpace (JavaSpaces Specification).
//
// Producers write() tuples; consumers take() or read() by template;
// watchers get push streams via notify(). Every tuple is leased through LeaseMgr.
// "Describe what you need, not where it is."
service SpaceService {
    // Write a leased tuple into the Space.
    // Jini: JavaSpace.write(Entry, Transaction, long lease)
    rpc Write(WriteRequest)               returns (WriteResponse);

    // Non-destructive read by template. Blocking or non-blocking.
    // Jini: JavaSpace.read() / readIfExists() (collapsed via wait flag)
    rpc Read(ReadRequest)                 returns (ReadResponse);

    // Atomic claim+remove by template. Blocking or non-blocking.
    // Jini: JavaSpace.take() / takeIfExists() (collapsed via wait flag)
    rpc Take(TakeRequest)                 returns (TakeResponse);

    // Server-streaming push on template match (appearance / expiration events).
    // Jini: JavaSpace.notify(Entry, Transaction, RemoteEventListener, long lease, MarshalledObject handback)
    rpc Notify(NotifyRequest)             returns (stream SpaceEvent);

    // Bulk read — streams all tuples matching a template without removing them.
    // Jini: JavaSpace05.contents(Collection, Transaction, long lease, long maxEntries)
    rpc Contents(ContentsRequest)         returns (stream Tuple);

    // Renew a tuple's lease.
    rpc Renew(RenewTupleRequest)          returns (Lease);

    // Cancel a tuple (remove from Space and cancel its lease).
    rpc Cancel(CancelTupleRequest)        returns (google.protobuf.Empty);
}

// ── Messages ─────────────────────────────────────────────────────────────────

message Tuple {
    string              tuple_id   = 1;
    map<string, string> attrs      = 2;   // indexed fields, template matching target
    bytes               payload    = 3;   // opaque data handle (optional)
    Provenance          provenance = 4;
    Lease               lease      = 5;
}

message Provenance {
    string                    written_by     = 1;
    google.protobuf.Timestamp written_at     = 2;
    string                    input_tuple_id = 3;  // lineage — which tuple produced this one
}

message WriteRequest {
    map<string, string> attrs          = 1;
    bytes               payload        = 2;
    uint64              ttl_seconds    = 3;
    string              written_by     = 4;
    string              input_tuple_id = 5;  // optional lineage
    string              txn_id         = 6;  // optional transaction (reserved for v2)
}

message WriteResponse {
    Tuple tuple = 1;
}

message ReadRequest {
    map<string, string> template   = 1;
    bool                wait       = 2;  // false = readIfExists
    uint64              timeout_ms = 3;  // 0 + wait=true = indefinite
    string              txn_id     = 4;  // optional transaction (reserved for v2)
}

message ReadResponse {
    Tuple tuple = 1;  // absent = no match (non-blocking)
}

message TakeRequest {
    map<string, string> template   = 1;
    bool                wait       = 2;
    uint64              timeout_ms = 3;
    string              txn_id     = 4;  // optional transaction (reserved for v2)
}

message TakeResponse {
    Tuple tuple = 1;
}

// ── Notify ──────────────────────────────────────────────────────────────────

enum SpaceEventType {
    APPEARANCE = 0;
    EXPIRATION = 1;
}

message NotifyRequest {
    map<string, string> template     = 1;
    SpaceEventType      on           = 2;
    uint64              ttl_seconds  = 3;  // lease on the watch itself
    bytes               handback     = 4;  // opaque; echoed with each event (Jini handback)
    string              txn_id       = 5;  // optional transaction (reserved for v2)
}

message SpaceEvent {
    SpaceEventType                type        = 1;
    Tuple                         tuple       = 2;
    google.protobuf.Timestamp     occurred_at = 3;
    bytes                         handback    = 4;  // echoed from NotifyRequest
}

// ── Contents ────────────────────────────────────────────────────────────────

message ContentsRequest {
    map<string, string> template     = 1;
    string              txn_id       = 2;  // optional transaction (reserved for v2)
}

// ── Lease management ─────────────────────────────────────────────────────────

message RenewTupleRequest {
    string tuple_id    = 1;
    uint64 ttl_seconds = 2;
}

message CancelTupleRequest {
    string tuple_id = 1;
}
