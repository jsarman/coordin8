syntax = "proto3";

package coordin8;

import "google/protobuf/empty.proto";

option go_package = "github.com/coordin8/proto/coordin8";

service ProxyService {
    rpc Open(OpenRequest)       returns (ProxyHandle);
    rpc Release(ReleaseRequest) returns (google.protobuf.Empty);
}

message OpenRequest {
    map<string, string> template = 1;
}

message ProxyHandle {
    string proxy_id   = 1;
    int32  local_port = 2;
}

message ReleaseRequest {
    string proxy_id = 1;
}
