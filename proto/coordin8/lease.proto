syntax = "proto3";

package coordin8;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/coordin8/proto/coordin8";

service LeaseService {
    rpc Grant(GrantRequest) returns (Lease);
    rpc Renew(RenewRequest) returns (Lease);
    rpc Cancel(CancelRequest) returns (google.protobuf.Empty);
    rpc WatchExpiry(WatchExpiryRequest) returns (stream ExpiryEvent);
}

message GrantRequest {
    string resource_id = 1;
    uint64 ttl_seconds = 2;
}

message RenewRequest {
    string lease_id = 1;
    uint64 ttl_seconds = 2;
}

message CancelRequest {
    string lease_id = 1;
}

message WatchExpiryRequest {
    // Empty = watch all expirations. Set resource_id to watch a specific one.
    string resource_id = 1;
}

message Lease {
    string lease_id = 1;
    string resource_id = 2;
    google.protobuf.Timestamp granted_at = 3;
    google.protobuf.Timestamp expires_at = 4;
}

message ExpiryEvent {
    string lease_id = 1;
    string resource_id = 2;
    google.protobuf.Timestamp expired_at = 3;
}
